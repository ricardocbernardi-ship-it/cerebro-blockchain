services:
  - type: web
    name: cerebro-blockchain
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node no-completo.js
    envVars:
      - key: PORT
        value: 10000
      - key: API_PORT
        value: 10000
      - key: P2P_PORT
        value: 10001
    healthCheckPath: /api/valid
